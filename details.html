<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* BODY FIX */
body {
  background: #f5f5f5;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ================= NAVBAR ================= */
header {
  background: #111;
  padding: 15px 40px;
}

.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  color: white;
  font-size: 22px;
  font-weight: 600;
}

.nav-links {
  list-style: none;
  display: flex;
}

.nav-links li {
  margin-left: 25px;
}

.nav-links a {
  color: white;
  text-decoration: none;
}

.nav-links a:hover {
  color: #ff4d5a;
}

/* Hamburger */
.menu-toggle {
  display: none;
  font-size: 26px;
  color: white;
  cursor: pointer;
}

/* Close button */
.close-btn {
  display: none;
}

/* ================= MAIN ================= */
.container {
  max-width: 900px;
  margin: auto;
  padding: 50px 20px;
  text-align: center;
  flex: 1;
}

/* IMAGE FIX (SAME SIZE ALWAYS) */
.container img {
  width: 100%;
  max-width: 500px;
  height: 300px;
  object-fit: cover;
  border-radius: 15px;
}

/* TEXT */
h1 {
  margin: 20px 0 10px;
}

p {
  line-height: 1.6;
}

/* ================= CTA ================= */
.cta {
  background: #111;
  color: white;
  text-align: center;
  padding: 60px 20px;
}

.cta p {
  margin: 15px 0;
}

/* BUTTON */
.btn {
  padding: 10px 25px;
  background: #ff4d5a;
  color: white;
  text-decoration: none;
  border-radius: 25px;
  display: inline-block;
}

/* ================= FOOTER ================= */
footer {
  background: #000;
  color: white;
  text-align: center;
  padding: 15px;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: fixed;
    top: 0;
    right: -100%;
    width: 250px;
    height: 100vh;
    background: #111;

    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;

    transition: 0.3s;
  }

  .nav-links.active {
    right: 0;
  }

  /* SHOW CLOSE BUTTON */
  .close-btn {
    display: block;
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 26px;
    color: white;
    cursor: pointer;
  }

}

</style>
</head>

<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar">
    <div class="logo">Emily Smith</div>

    <div class="menu-toggle" id="menu-toggle">☰</div>

    <ul class="nav-links" id="nav-links">

      <!-- CLOSE BUTTON -->
      <div class="close-btn" id="close-btn">✕</div>

      <li><a href="index.html">Home</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="./about.html">About</a></li>
      <li><a href="./contact.html">Contact</a></li>

    </ul>
  </nav>
</header>

<!-- MAIN CONTENT -->
<div class="container">
  <img id="project-img">
  <h1 id="project-title"></h1>
  <p id="project-desc"></p>
</div>

<!-- CTA -->
<section class="cta">
  <h2>Let's Work Together</h2>
  <p>Have a project in mind? I'd love to hear from you.</p>
  <a href="#" class="btn">Contact Me</a>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Emily Smith. All rights reserved.</p>
</footer>

<script>

/* GET ID */
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

/* PROJECT DATA */
const projects = {
  1: {
    title: "Brand Identity Design",
    img: "https://images.unsplash.com/photo-1611224923853-80b023f02d71",
    desc: "Complete branding solution for modern businesses."
  },
  2: {
    title: "Website UI Design",
    img: "https://images.unsplash.com/photo-1559028012-481c04fa702d",
    desc: "Modern, responsive UI for web applications."
  },
  3: {
    title: "Social Media Graphics",
    img: "https://images.unsplash.com/photo-1542744173-8e7e53415bb0",
    desc: "Creative designs for social media campaigns."
  },
  4: {
    title: "Logo Design",
    img: "https://images.unsplash.com/photo-1507238691740-187a5b1d37b8",
    desc: "Unique and memorable logo concepts."
  },
  5: {
    title: "Mobile App UI",
    img: "https://images.unsplash.com/photo-1492724441997-5dc865305da7",
    desc: "Clean and intuitive mobile UI design."
  },
  6: {
    title: "Poster Design",
    img: "https://images.unsplash.com/photo-1522199710521-72d69614c702",
    desc: "Creative posters for marketing promotions."
  }
};

/* LOAD DATA */
if (projects[id]) {
  document.getElementById("project-title").textContent = projects[id].title;
  document.getElementById("project-img").src = projects[id].img;
  document.getElementById("project-desc").textContent = projects[id].desc;
}

/* MENU */
const toggle = document.getElementById("menu-toggle");
const nav = document.getElementById("nav-links");
const closeBtn = document.getElementById("close-btn");

toggle.addEventListener("click", () => {
  nav.classList.add("active");
});

closeBtn.addEventListener("click", () => {
  nav.classList.remove("active");
});

</script>

</body>
</html>
